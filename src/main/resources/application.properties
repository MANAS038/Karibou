# Karibou Express Cash Reconciliation Engine - Application Configuration

# Server configuration
server.port=8095

# Application name
spring.application.name=karibou-reconciliation-engine

# JSON serialization (simplified for compatibility)
spring.jackson.serialization.INDENT_OUTPUT=true
spring.jackson.deserialization.FAIL_ON_NULL_FOR_PRIMITIVES=false
spring.jackson.property-naming-strategy=SNAKE_CASE

# Logging
logging.level.root=INFO
logging.level.karibou.recon=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
